<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MockMentor — Email Verification</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 40px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.08);
      border: 1px solid #f1f5f9;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      background: #dbeafe;
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    p {
      color: #64748b;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 16px;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #1d4ed8; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #bfdbfe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">
      <div class="spinner"></div>
    </div>
    <h1 id="title">Verifying your email...</h1>
    <p id="message">Please wait a moment.</p>
    <div id="action"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, applyActionCode } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyAgok7C_4SGlOv3CibSJ9btpLRC5f1XqLY',
      authDomain: 'sql-calculation-393000.firebaseapp.com',
      projectId: 'sql-calculation-393000',
      storageBucket: 'sql-calculation-393000.firebasestorage.app',
      messagingSenderId: '755973674567',
      appId: '1:755973674567:web:f3fc6016e1bfbda3144362'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const oobCode = params.get('oobCode');

    const icon = document.getElementById('icon');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const action = document.getElementById('action');

    function showSuccess() {
      icon.style.background = '#dcfce7';
      icon.innerHTML = `<svg width="36" height="36" fill="none" stroke="#16a34a" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>`;
      title.textContent = 'Email Verified!';
      message.textContent = 'Your email has been verified successfully. You can now sign in to MockMentor and start practising.';
      action.innerHTML = '<a class="btn" href="https://sql-calculation-393000.web.app">Sign In to MockMentor</a>';
    }

    function showError(msg) {
      icon.style.background = '#fee2e2';
      icon.innerHTML = `<svg width="36" height="36" fill="none" stroke="#dc2626" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>`;
      title.textContent = 'Verification Failed';
      message.textContent = msg || 'The link may have expired or already been used. Request a new one by signing in.';
      action.innerHTML = '<a class="btn" href="https://sql-calculation-393000.web.app">Back to MockMentor</a>';
    }

    if (mode === 'verifyEmail' && oobCode) {
      applyActionCode(auth, oobCode)
        .then(() => showSuccess())
        .catch((err) => {
          if (err.code === 'auth/invalid-action-code') {
            showError('This verification link has already been used or has expired.');
          } else {
            showError('Verification failed. Please try again.');
          }
        });
    } else {
      showError('Invalid verification link.');
    }
  </script>
</body>
</html>
